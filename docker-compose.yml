services:
  postgres:
    image: postgres:16-alpine
    container_name: chat-backend-db
    environment:
      POSTGRES_DB: compareai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d compareai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/python-training/chat-backend
      dockerfile: Dockerfile
    container_name: chat-backend-api
    env_file:
      - ./backend/python-training/chat-backend/app/configuration/.env
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: compareai
      DB_INIT: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
